<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">monSQLize logo</title>
  <desc id="desc">A rounded monogram combining a database stack, query flow, and the letter M.</desc>
  <defs>
    <linearGradient id="surface" x1="86" y1="46" x2="426" y2="466" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06162A"/>
      <stop offset="0.48" stop-color="#0E2F55"/>
      <stop offset="1" stop-color="#1466D8"/>
    </linearGradient>
    <linearGradient id="accent" x1="142" y1="154" x2="388" y2="368" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#40E0D0"/>
      <stop offset="0.52" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="whiteGlow" x1="158" y1="184" x2="354" y2="348" gradientUnits="userSpaceOnUse">
