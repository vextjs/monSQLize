    </radialGradient>
    <filter id="shadow" x="22" y="18" width="468" height="486" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#surface)"/>
  <circle cx="332" cy="178" r="210" fill="url(#halo)"/>
  <path d="M84 366C170 314 244 412 428 308" fill="none" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round" opacity="0.16"/>
  <path d="M90 168C186 94 284 124 424 84" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.10"/>

