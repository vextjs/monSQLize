# Codecov Configuration
# See: https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 0%
    patch:
      default:
        target: 90%
        threshold: 0%

comment:
  layout: "header, diff, files"
  behavior: default
  require_changes: false

ignore:
  - "test/**/*"
  - "examples/**/*"
  - "scripts/**/*"
  - "reports/**/*"
  - "*.test.js"
  - "*.test.ts"

