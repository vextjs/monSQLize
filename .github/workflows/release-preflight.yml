name: Release Preflight

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release preflight
        run: npm run release:preflight
